name: External Trigger
on:
  repository_dispatch:
    types: [ping-sentinel]
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread google-auth requests streamlit pandas-ta st-gsheets-connection altair streamlit-autorefresh

      - name: Run Scout
        env:
          # --- Sheets & Vault ---
          GSHEETS_SECRET: ${{ secrets.GSHEETS_JSON }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          # --- Claw Sentiment Key ---
          CP_API_KEY: ${{ secrets.CP_API_KEY }}
        run: python scout_job.py

      - name: Commit and Push Trade Log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "vance@alt-sentinel.ai"
          git config --local user.name "Vance (Background Scout)"
          git add -f trades.csv || true
          if git diff --cached --quiet; then
            echo "No new updates. Skipping push."
          else
            git commit -m "Vance updated the Sentinel Ledger [skip ci]"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          fi
